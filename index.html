---
layout: default
---

<ul id="posts">
  {% for post in site.posts %}
    <li>
      <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
      <p>
        {{ post.content | strip_html | truncatewords:50}}
        <br />
        <a href="{{ post.url }}" class="read_more">read more</a>
      </p>
    </li>
  {% endfor %}
</ul>
